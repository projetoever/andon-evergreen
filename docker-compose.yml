services:
  postgres:
    image: postgres:16-alpine
    container_name: andon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: andon
      POSTGRES_PASSWORD: andon_dev_password
      POSTGRES_DB: andon_db
    ports:
      - "5432:5432"
    volumes:
      - andon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andon -d andon_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  andon_postgres_data:
